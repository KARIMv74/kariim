<!DOCTYPE html>
<html lang="en" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KARIM | PROFILE</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Montserrat:wght@300;400;700&display=swap');

        :root {
            --bg-deep: #0a0b10;
            --card-dark: #111218;
            --neon-purple: #9d4edd;
            --neon-glow: rgba(157, 78, 221, 0.4);
            --text-gray: #888990;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-deep);
            background-image: radial-gradient(circle at 50% 50%, #1a1b25 0%, #0a0b10 100%);
            color: white;
            font-family: 'Montserrat', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #entry-gate {
            position: fixed; inset: 0; background: #000; z-index: 1000;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }
        .gate-msg { font-size: 0.7rem; letter-spacing: 5px; color: var(--neon-purple); text-transform: uppercase; animation: pulse 2s infinite; }

        .profile-card {
            width: 360px;
            height: 680px; 
            background: var(--card-dark);
            border-radius: 35px;
            position: relative;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            opacity: 0; transform: translateY(20px); transition: 1s ease;
            overflow: hidden;
        }

        .profile-card::before {
            content: '';
            position: absolute;
            width: 150%;
            height: 150%;
            background: conic-gradient(transparent, transparent, transparent, var(--neon-purple));
            animation: rotateBorder 4s linear infinite;
        }

        .profile-card::after {
            content: '';
            position: absolute;
            inset: 2px;
            background: var(--card-dark);
            border-radius: 33px;
            z-index: 0;
        }

        .profile-card.show { opacity: 1; transform: translateY(0); }
        .profile-card > * { position: relative; z-index: 1; }

        .name-header {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.8rem;
            font-weight: 700;
            color: var(--neon-purple);
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 20px;
            text-shadow: 0 0 15px var(--neon-glow);
            animation: fadeName 3s ease-in-out infinite;
        }

        @keyframes fadeName {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.2; transform: scale(0.95); }
        }

        .avatar-container {
            position: relative;
            width: 140px;
            height: 140px;
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .avatar-circle {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid var(--card-dark);
            z-index: 2;
        }
        .avatar-circle img { width: 100%; height: 100%; object-fit: cover; }

        .avatar-container::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(transparent, transparent, var(--neon-purple));
            animation: rotateBorder 3s linear infinite;
        }

        .status-dot {
            position: absolute; bottom: 12px; right: 12px;
            width: 15px; height: 15px; background: #2ecc71;
            border: 3px solid var(--card-dark); border-radius: 50%;
            box-shadow: 0 0 10px #2ecc71;
            z-index: 3;
        }

        .music-player {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(157, 78, 221, 0.1);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .play-btn {
            background: var(--neon-purple);
            border: none; width: 35px; height: 35px; border-radius: 50%;
            color: white; cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: 0.3s;
        }
        .track-info { flex-grow: 1; }
        .track-name { font-size: 0.7rem; font-weight: bold; display: block; }
        .track-artist { font-size: 0.5rem; color: var(--text-gray); }

        .info-row { display: flex; gap: 10px; width: 100%; margin-bottom: 25px; }
        .info-pill {
            flex: 1; background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(157, 78, 221, 0.15);
            border-radius: 15px; padding: 10px; text-align: center;
        }
        .pill-title { font-size: 0.5rem; color: var(--text-gray); display: block; }
        .pill-body { font-size: 0.7rem; font-weight: bold; }

        .designer-tag {
            font-size: 0.55rem; color: var(--text-gray); letter-spacing: 3px;
            text-transform: uppercase; margin-top: auto; padding-top: 20px;
        }
        .designer-tag span { color: var(--neon-purple); font-weight: bold; }

        @keyframes rotateBorder {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }

    </style>
</head>
<body>

    <div id="entry-gate">
        <div class="gate-msg">Enter</div>
    </div>

    <div class="profile-card">
        <h1 class="name-header">KARIM</h1>

        <div class="avatar-container">
            <div class="avatar-circle">
                <img src="https://xatimg.com/image/XYuscM5eiLO9.png">
            </div>
            <div class="status-dot"></div>
        </div>

        <div class="music-player">
            <button class="play-btn" id="master-play"><i class="ph-fill ph-play" id="play-icon"></i></button>
            <div class="track-info">
                <span class="track-name">Hossam Habib</span>
                <span class="track-artist">Malnash Naseeb</span>
            </div>
            <i class="ph ph-waveform" style="color: var(--neon-purple); font-size: 1.2rem;"></i>
        </div>

        <div class="info-row">
            <div class="info-pill">
                <span class="pill-title">ORIGIN</span>
                <div class="pill-body">Egypt</div>
            </div>
            <div class="info-pill">
                <span class="pill-title">HOBBY</span>
                <div class="pill-body">Football</div>
            </div>
        </div>

        <div style="font-size: 0.6rem; color: var(--text-gray); letter-spacing: 3px; margin-bottom: 15px;">KEEP GOING</div>
        
        <div class="designer-tag">Design <span>KEMO</span></div>

        <audio id="bg-music" loop src="https://files.catbox.moe/t6c69v.mp3"></audio>
    </div>

    <script>
        const gate = document.getElementById('entry-gate');
        const card = document.querySelector('.profile-card');
        const music = document.getElementById('bg-music');
        const playBtn = document.getElementById('master-play');
        const playIcon = document.getElementById('play-icon');

        gate.onclick = () => {
            gate.style.opacity = '0';
            setTimeout(() => {
                gate.style.display = 'none';
                card.classList.add('show');
                music.play().then(() => {
                    playIcon.className = "ph-fill ph-pause";
                });
            }, 500);
        };

        playBtn.onclick = () => {
            if (music.paused) {
                music.play();
                playIcon.className = "ph-fill ph-pause";
            } else {
                music.pause();
                playIcon.className = "ph-fill ph-play";
            }
        };
    </script>
</body>
</html>
